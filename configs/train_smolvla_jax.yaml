# SmolVLA JAX 微调配置。改这里即可，不必手改 Hugging Face cache 里的 config.json。
# 运行:
#   uv run python tools/train_smolvla_jax.py --config configs/train_smolvla_jax.yaml

# ---- 预训练权重 ----
checkpoint: lerobot/smolvla_base
revision: null
allow_download: true

# ---- 数据集 ----
# 写一个或多个均可；每个条目可有独立 root / action_key / rename_map / weight
datasets:
  - repo_id: chaoyi/tactile_test_03
    # root: /workspace/lerobot_v30/chaoyi/tactile_test_03
    action_key: actions
    weight: 1.0
    rename_map:
      observation.images.camera0: observation.images.camera1
      observation.images.camera1: observation.images.camera2
  # - repo_id: chaoyi/another_dataset
  #   action_key: actions
  #   weight: 1.0
  #   rename_map:
  #     observation.images.cam_high: observation.images.camera1
  #     observation.images.cam_low: observation.images.camera2

# ---- 输出与训练超参 ----
output: /workspace/smolvla_runs/tactile_test_03_3gpu_2
steps: 30000
batch_size: 6          # 全局 batch，多卡时必须能被 GPU 数整除
num_workers: 4
prefetch_factor: 2
video_backend: null
log_freq: 10
save_freq: 1000
seed: 42
resume: null
data_parallel: true
allow_tokenizer_download: true

# ---- Weights & Biases ----
wandb:
  enabled: true
  project: smolvla-jax
  entity: null          # 可选：你的 team / username
  name: tactile_test_03_3gpu
  mode: online          # online | offline | disabled
  tags:
    - smolvla
    - tactile
  log_checkpoints: false

# ---- 覆盖 checkpoint 的模型配置（对应原 config.json）----
# 数据集 actions / observation.state 是 20 维；base 权重默认是 6 维。
model:
  # 每个模块必须选择一种模式：frozen | full | lora
  # lora 只作用于该模块的 Linear；Conv / Embedding / Norm 保持冻结。
  module_modes:
    vision: lora
    connector: full
    vlm_text: lora
    expert: full
    action: full
    state_proj: full
  lora_rank: 8
  lora_alpha: 16.0

  action_dim: 20
  state_dim: 20
  max_action_dim: 32
  max_state_dim: 32
  # 与 rename_map 之后的相机名对齐；数量通常保持与预训练一致（3 路）
  image_keys:
    - observation.images.camera1
    - observation.images.camera2
  chunk_size: 50
  n_action_steps: 50
  # image_keys 里缺的相机，最多用几路空图（mask=0）补齐；训练/部署共用，写进 checkpoint
  empty_cameras: 0
  optimizer_lr: 0.0001
  optimizer_grad_clip_norm: 10.0
  scheduler_warmup_steps: 1000
  scheduler_decay_steps: 30000
